<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Student Profile Card</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-gradient: linear-gradient(180deg, #ffffff 0%, #f8f9ff 100%);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --shadow-color: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Vibrant Gradient Background */
            background: #667eea;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: var(--card-gradient);
            /* Enhanced Rounded Corners */
            border-radius: 30px;
            /* Deep Floating Shadow */
            box-shadow: 0 20px 40px var(--shadow-color);
            width: 380px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        .image-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            /* Gradient Border for Avatar */
            background: var(--primary-gradient);
            padding: 5px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .stream {
            font-size: 0.9rem;
            font-weight: 700;
            color: #764ba2;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            display: inline-block;
            padding: 4px 12px;
            background: rgba(118, 75, 162, 0.1);
            border-radius: 50px;
        }

        .bio {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 2rem;
            padding: 0 10px;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <img src="https://ui-avatars.com/api/?name=Sarah+Miller&background=fff&color=764ba2&size=200" alt="Profile Picture" class="profile-img">
        </div>
        
        <h1 class="name">Sarah Miller</h1>
        <p class="stream">Data Science Honors</p>
        
        <p class="bio">
            Exploring patterns in data to tell meaningful stories. Aspiring Data Scientist with a focus on Machine Learning and ethical AI development.
        </p>

        <a href="#" class="btn">Connect Now</a>
    </div>

</body>
</html>
